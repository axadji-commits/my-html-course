<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Kirish</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .admin-login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .admin-login-box h1 {
            margin: 0 0 8px 0;
            color: var(--primary);
            font-size: 28px;
            text-align: center;
        }
        .admin-login-box p {
            margin: 0 0 24px 0;
            color: var(--muted);
            text-align: center;
            font-size: 14px;
        }
        .admin-form-group {
            margin-bottom: 20px;
        }
        .admin-form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
        }
        .admin-form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .admin-form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .admin-login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .admin-login-btn:hover {
            opacity: 0.9;
        }
        .admin-error {
            margin-top: 12px;
            padding: 12px;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .admin-back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
        }
        .admin-back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <h1>🔐 Admin Panel</h1>
            <p>Test natijalarini ko'rish va boshqarish</p>
            
            <form id="adminLoginForm" onsubmit="return adminLogin(event)">
                <div class="admin-form-group">
                    <label for="adminPassword">Parol</label>
                    <input type="password" id="adminPassword" placeholder="Parolni kiriting" required>
                </div>
                
                <button type="submit" class="admin-login-btn">Kirish</button>
                
                <div id="adminError" class="admin-error"></div>
            </form>
            
            <a href="index.html" class="admin-back-link">← Bosh sahifaga qaytish</a>
        </div>
    </div>

    <script>
        // Admin paroli (o'zgartirish mumkin)
        const ADMIN_PASSWORD = "admin123";
        
        function adminLogin(event) {
            event.preventDefault();
            
            const passwordInput = document.getElementById('adminPassword');
            const errorDiv = document.getElementById('adminError');
            const password = passwordInput.value;
            
            if (password === ADMIN_PASSWORD) {
                // Parol to'g'ri - admin dashboard'ga o'tish
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                // Parol noto'g'ri
                errorDiv.textContent = '❌ Noto\'g\'ri parol!';
                errorDiv.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
    </script>
</body>
</html>
