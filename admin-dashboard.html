<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin-bottom: 24px;
        }
        .admin-header-content {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .admin-header h1 {
            margin: 0;
            font-size: 24px;
        }
        .admin-logout-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .admin-logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .admin-stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .admin-stat-card h3 {
            margin: 0 0 8px 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }
        .admin-stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }
        .admin-filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .admin-filters h3 {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: var(--text);
        }
        .admin-filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .admin-filter-group {
            flex: 1;
            min-width: 200px;
        }
        .admin-filter-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }
        .admin-filter-group select,
        .admin-filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }
        .admin-results-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .admin-table-header {
            background: #f9fafb;
            padding: 16px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-table-header h3 {
            margin: 0;
            font-size: 18px;
            color: var(--text);
        }
        .admin-table-container {
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
            border-bottom: 2px solid var(--border);
        }
        .admin-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
        }
        .admin-table tr:hover {
            background: #f9fafb;
        }
        .admin-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-html {
            background: #dcfce7;
            color: #166534;
        }
        .badge-css {
            background: #dbeafe;
            color: #1e40af;
        }
        .badge-js {
            background: #fef3c7;
            color: #92400e;
        }
        .admin-no-data {
            padding: 40px;
            text-align: center;
            color: var(--muted);
        }
        .admin-export-btn {
            padding: 8px 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .admin-export-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="admin-header-content">
            <h1>📊 Admin Panel — Dashboard</h1>
            <a href="#" onclick="adminLogout()" class="admin-logout-btn">Chiqish</a>
        </div>
    </div>

    <main>
        <!-- Statistika kartalar -->
        <div class="admin-stats">
            <div class="admin-stat-card">
                <h3>Jami testlar</h3>
                <p class="stat-value" id="totalTests">0</p>
            </div>
            <div class="admin-stat-card">
                <h3>O'rtacha ball</h3>
                <p class="stat-value" id="averageScore">0%</p>
            </div>
            <div class="admin-stat-card">
                <h3>Foydalanuvchilar</h3>
                <p class="stat-value" id="totalUsers">0</p>
            </div>
            <div class="admin-stat-card">
                <h3>Bugun testlar</h3>
                <p class="stat-value" id="todayTests">0</p>
            </div>
        </div>

        <!-- Filtrlar -->
        <div class="admin-filters">
            <h3>🔍 Filtrlar</h3>
            <div class="admin-filter-row">
                <div class="admin-filter-group">
                    <label>Test turi</label>
                    <select id="filterTestType" onchange="filterResults()">
                        <option value="">Barchasi</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="JavaScript">JavaScript</option>
                    </select>
                </div>
                <div class="admin-filter-group">
                    <label>Ball bo'yicha</label>
                    <select id="filterScore" onchange="filterResults()">
                        <option value="">Barchasi</option>
                        <option value="high">Yuqori (75%+)</option>
                        <option value="medium">O'rtacha (50-74%)</option>
                        <option value="low">Past (50% dan)</option>
                    </select>
                </div>
                <div class="admin-filter-group">
                    <label>Qidirish (ism/familiya)</label>
                    <input type="text" id="searchInput" placeholder="Ism yoki familiya..." onkeyup="filterResults()">
                </div>
            </div>
        </div>

        <!-- Natijalar jadvali -->
        <div class="admin-results-table">
            <div class="admin-table-header">
                <h3>📋 Test natijalari</h3>
                <button class="admin-export-btn" onclick="exportToCSV()">CSV yuklab olish</button>
            </div>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Ism</th>
                            <th>Familiya</th>
                            <th>Test turi</th>
                            <th>Ball</th>
                            <th>Foiz</th>
                            <th>Sana</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr>
                            <td colspan="7" class="admin-no-data">Ma'lumotlar yuklanmoqda...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
