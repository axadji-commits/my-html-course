<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Менинг сайтим</title>
  <style>
    /* Чатбот контейнери учун стиллар */
    .chatbot-container {
      max-width: 600px; /* Максималь кенглик */
      margin: 20px auto; /* Маргинлар (юқори ва пастга) */
      padding: 10px; /* Ички бошқариқ */
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Соя эффекти */
      background-color: #f9f9f9; /* Фон ранги */
      border-radius: 10px; /* Буричларни йумшатиш */
    }

    /* iframe учун стиллар */
    .chatbot-container iframe {
      background-color: white; /* Оқ фон */
      border-radius: 8px; /* Буричларни йумшатиш */
      border: none; /* Чегарани йўқ қилиш */
    }
  </style>
</head>
<body>
  <h1>Менинг таълим платформам</h1>

  <!-- Чатбот контейнери -->
  <div class="chatbot-container">
    <h3>Бизнинг сухбатботимзга хуш кеllibсиз!</h3>
    <!-- iframe орқали чатботни ўрнатиш -->
    <iframe
        src="https://mistral.ai/your-chatbot-link" <!-- Бу ерга чатбот хавроласини киритинг! -->
        width="100%" <!-- Тўлиқ кенглик -->
        height="500px" <!-- Балиқлик -->
        frameborder="0" <!-- Чегарани йўқ қилиш -->
        style="border-radius: 8px; border: none;"> <!-- Буричларни йумшатиш -->
    </iframe>
  </div>
</body>
</html>
